[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  # Pixel IDs are public identifiers (visible in the browser pixel snippet),
  # not secrets. Exclude META_PIXEL_ID from Netlify's secret scanner so the
  # build doesn't fail when it spots the value in our HTML.
  SECRETS_SCAN_OMIT_KEYS = "META_PIXEL_ID"

[functions]
  node_bundler = "esbuild"

# Pretty endpoint: POST /api/track proxied to the function
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200
  force = true
